name: 'jaffle_shop_external'
version: '1.0.0'
config-version: 2

profile: 'default'

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"


seeds:
  jaffle_shop_external:
    +persist_docs:
      relation: true
      columns: true
    autre:
      +schema: dbt_raw_autre
      +tags: 'autre'
      # Le post_hook de ces seeds défini les grants sur le schema
    raw:
      +schema: seeds_raw
      +tags: 'raw'
      # Les 2 post_hook de ces seeds crééent les tables definitives dans dbt_raw_jaffle_shop et dbt_raw_stripe
      # et définissent les grants sur les 2 schemas
      
      # Ne pas créer de dépendenace entre ces seeds et le reste du projet
      # sinon la compilation risque de planter a cause de la gestion de la transaction si on desactive ces seeds
      # https://docs.getdbt.com/reference/resource-configs/pre-hook-post-hook#transaction-behavior
      # Ces seeds ne sont la que pour préparer les sources du projet (d'ou un projet à part)
      # dbt seed --select raw --full-refresh [--profile pg]
      
      # +enabled: "{{ var('load_source_data', 'False') | as_bool }}" pas valide du point de vue jsonschema
      # --vars '{"load_source_data": "True"}'

flags:
  require_unique_project_resource_names: true
