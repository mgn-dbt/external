name: 'jaffle_shop_external'
version: '1.0.0'
config-version: 2

profile: default

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  jaffle_shop_external:
    autre:
      +schema: seeds_autre
      +tags: 'autre'
    raw:
      +schema: seeds_raw
      +tags: 'raw'

models:
  jaffle_shop_external:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    marts:
      +materialized: table
